budgets:
  pipelines: 3
  workers: 5
  time:
    minutes: 60

pipeline:

  defaults:
    candidates: []
    mandatory: false
    source: training

  steps:
    imputation:
      candidates:
        - simple_imputer:
            params:
              strategy: [mean, median]
        - iterative_imputer:
            params:
              max_iter: [10]

    discretization:
      candidates:
        - kbins:
            params:
              n_bins: [10]
              encode: [ordinal]
              strategy: [quantile]
        - binarizer:
            params:
              threshold: [0.0]

    normalization:
      candidates:
        - power_transformer:
            params:
              method: [yeo-johnson]
        - robust_scaler:
            params:
              quantile_range:
                - [25.0, 75.0]
        - standard:
            params: {}
        - minmax:
            params:
              feature_range:
                - [0, 1]

    features:
      candidates:
        - select_k_best:
            params:
              k: [5, 10]
        - pca:
            params:
              n_components: [0.95]

    rebalancing:
      candidates:
        - near_miss:
            params:
              version: [1]
        - smote:
            params:
              k_neighbors: [5]

    classification:
      mandatory: true
      candidates:
        - decision_tree:
            params:
              max_depth: [null, 10]
              min_samples_split: [2, 5]
        - knn:
            params:
              n_neighbors: [5, 11]
              weights: [uniform, distance]
        - naive_bayes:
            params:
              var_smoothing: [1e-9]
        - nn:
            params:
              hidden_layer_sizes:
                - [50]
                - [100]
              alpha: [0.001]
              max_iter: [300]
        - random_forest:
            params:
              n_estimators: [200]
              max_depth: [null, 20]
        - ada_boost:
            params:
              n_estimators: [100]
              learning_rate: [0.1]

ordering:
  - sequence:
      - imputation
      - discretization
      - normalization
      - features
      - rebalancing
      - classification

constraints:

  - if:
      step:
        classification: decision_tree
    require: [discretization]
    forbid: [normalization, features]

  - if:
      step:
        classification: random_forest
    forbid: [normalization]

  - if:
      step:
        classification: knn
    require: [normalization, features]

  - if:
      step:
        classification: nn
    require: [normalization]
    forbid: [discretization]

  - if:
      step:
        classification: naive_bayes
    forbid: [normalization]

  - if:
      step:
        classification: ada_boost
    forbid: [normalization]

  # =========================
  # SHARED BEST PRACTICES
  # =========================

  - if:
      step:
        features: pca
    require: [normalization]

  - if:
      step:
        features: select_k_best
    forbid: [discretization]

  - if:
      step:
        rebalancing: smote
    require: [imputation]

  - if:
      step:
        imputation: iterative_imputer
    require: [normalization]


technical_details:
  - use Python for the implementation
  - use scikit-learn for the ML algorithms (using Pipeline class if possible)
