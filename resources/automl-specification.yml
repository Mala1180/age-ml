pipeline:
  steps:
    imputation:
      values: [simple_imputer, iterative_imputer]

    discretization:
      values: [kbins, binarizer]

    normalization:
      values: [power_transformer, robust_scaler, standard, minmax]

    features:
      values: [select_k_best, pca]

    rebalancing:
      values: [near_miss, smote]

    classification:
      values: [dt, knn, naive_bayes, nn, rf, ada_boost]
      terminal: true

    regression:
      values: [linear, ridge, lasso, elastic_net, svr, knn_regressor, rf_regressor, nn_regressor]
      terminal: true


rules:
  ordering:
    - before: imputation
      after: discretization

    - before: imputation
      after: normalization

    - before: imputation
      after: features

    - before: imputation
      after: rebalancing

    - before: discretization
      after: normalization

    - before: normalization
      after: features

    - before: features
      after: classification

    - before: features
      after: regression

    - before: rebalancing
      after: classification

    - before: rebalancing
      after: regression


constraints:

  - if:
      classification: {}
    forbid:
      steps: [regression]

  - if:
      regression: {}
    forbid:
      steps: [classification]

  # =========================
  # CLASSIFICATION
  # =========================

  - if:
      classification: dt
    require:
      steps: [discretization]
    forbid:
      steps: [normalization, features]

  - if:
      classification: rf
    forbid:
      steps: [normalization]

  - if:
      classification: knn
    require:
      steps: [normalization, features]

  - if:
      classification: nn
    require:
      steps: [normalization]
    forbid:
      steps: [discretization]

  - if:
      classification: naive_bayes
    forbid:
      steps: [normalization]

  - if:
      classification: ada_boost
    forbid:
      steps: [normalization]


  # =========================
  # REGRESSION
  # =========================

  - if:
      regression: linear
    require:
      steps: [normalization]
    forbid:
      steps: [discretization]

  - if:
      regression: ridge
    require:
      steps: [normalization]
    forbid:
      steps: [discretization]

  - if:
      regression: lasso
    require:
      steps: [normalization]
    forbid:
      steps: [discretization]

  - if:
      regression: elastic_net
    require:
      steps: [normalization]
    forbid:
      steps: [discretization]

  - if:
      regression: svr
    require:
      steps: [normalization]
    forbid:
      steps: [discretization]

  - if:
      regression: knn_regressor
    require:
      steps: [normalization, features]

  - if:
      regression: nn_regressor
    require:
      steps: [normalization]
    forbid:
      steps: [discretization]

  - if:
      regression: rf_regressor
    forbid:
      steps: [normalization]


  # =========================
  # SHARED BEST PRACTICES
  # =========================

  - if:
      features: pca
    require:
      steps: [normalization]

  - if:
      features: select_k_best
    forbid:
      steps: [discretization]

  - if:
      rebalancing: smote
    require:
      steps: [imputation]

  - if:
      imputation: iterative_imputer
    require:
      steps: [normalization]