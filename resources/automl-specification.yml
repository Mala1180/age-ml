pipeline:

  defaults:
    values: []
    mandatory: false
    terminal: false
    initial: false

  steps:
    imputation:
      values: [simple_imputer, iterative_imputer]

    discretization:
      values: [kbins, binarizer]

    normalization:
      values: [power_transformer, robust_scaler, standard, minmax]

    features:
      values: [select_k_best, pca]

    rebalancing:
      values: [near_miss, smote]

    classification:
      values: [dt, knn, naive_bayes, nn, rf, ada_boost]
      terminal: true

    regression:
      values: [linear, ridge, lasso, elastic_net, svr, knn_regressor, rf_regressor, nn_regressor]
      terminal: true



partial_ordering:
  - before: imputation
    after: discretization

  - before: imputation
    after: normalization

  - before: imputation
    after: features

  - before: imputation
    after: rebalancing

  - before: discretization
    after: normalization

  - before: normalization
    after: features

  - before: features
    after: classification

  - before: features
    after: regression

  - before: rebalancing
    after: classification

  - before: rebalancing
    after: regression


constraints:

  - if:
      classification: {}
    forbid: [regression]

  - if:
      regression: {}
    forbid: [classification]

  # =========================
  # CLASSIFICATION
  # =========================

  - if:
      classification: dt
    require: [discretization]
    forbid: [normalization, features]

  - if:
      classification: rf
    forbid: [normalization]

  - if:
      classification: knn
    require: [normalization, features]

  - if:
      classification: nn
    require: [normalization]
    forbid: [discretization]

  - if:
      classification: naive_bayes
    forbid: [normalization]

  - if:
      classification: ada_boost
    forbid: [normalization]


  # =========================
  # REGRESSION
  # =========================

  - if:
      regression: linear
    require: [normalization]
    forbid: [discretization]

  - if:
      regression: ridge
    require: [normalization]
    forbid: [discretization]

  - if:
      regression: lasso
    require: [normalization]
    forbid: [discretization]

  - if:
      regression: elastic_net
    require: [normalization]
    forbid: [discretization]

  - if:
      regression: svr
    require: [normalization]
    forbid: [discretization]

  - if:
      regression: knn_regressor
    require: [normalization, features]

  - if:
      regression: nn_regressor
    require: [normalization]
    forbid: [discretization]

  - if:
      regression: rf_regressor
    forbid: [normalization]


  # =========================
  # SHARED BEST PRACTICES
  # =========================

  - if:
      features: pca
    require: [normalization]

  - if:
      features: select_k_best
    forbid: [discretization]

  - if:
      rebalancing: smote
    require: [imputation]

  - if:
      imputation: iterative_imputer
    require: [normalization]