pipeline:

  defaults:
    candidates: []
    mandatory: false
    terminal: false
    initial: false

  steps:
    imputation:
      candidates:
        - simple_imputer:
            params:
              strategy: [mean, median]
        - iterative_imputer:
            params:
              max_iter: [10]

    discretization:
      candidates:
        - kbins:
            params:
              n_bins: [10]
              encode: [ordinal]
              strategy: [quantile]
        - binarizer:
            params:
              threshold: [0.0]

    normalization:
      candidates:
        - power_transformer:
            params:
              method: [yeo-johnson]
        - robust_scaler:
            params:
              quantile_range:
                - [25.0, 75.0]
        - standard:
            params: {}
        - minmax:
            params:
              feature_range:
                - [0, 1]

    features:
      candidates:
        - select_k_best:
            params:
              k: [5, 10]
        - pca:
            params:
              n_components: [0.95]

    rebalancing:
      candidates:
        - near_miss:
            params:
              version: [1]
        - smote:
            params:
              k_neighbors: [5]

    classification:
      terminal: true
      candidates:
        - dt:
            params:
              max_depth: [null, 10]
              min_samples_split: [2, 5]
        - knn:
            params:
              n_neighbors: [5, 11]
              weights: [uniform, distance]
        - naive_bayes:
            params:
              var_smoothing: [1e-9]
        - nn:
            params:
              hidden_layer_sizes:
                - [50]
                - [100]
              alpha: [0.001]
              max_iter: [300]
        - rf:
            params:
              n_estimators: [200]
              max_depth: [null, 20]
        - ada_boost:
            params:
              n_estimators: [100]
              learning_rate: [0.1]


    regression:
      terminal: true
      candidates:
        - linear:
            params: {}
        - ridge:
            params:
              alpha: [1.0, 10.0]
        - lasso:
            params:
              alpha: [0.01, 0.1]
        - elastic_net:
            params:
              alpha: [0.01]
              l1_ratio: [0.5]
        - svr:
            params:
              kernel: [rbf]
              C: [1.0, 10.0]
              epsilon: [0.1]
        - knn_regressor:
            params:
              n_neighbors: [5, 11]
              weights: [distance]
        - rf_regressor:
            params:
              n_estimators: [200]
              max_depth: [null, 20]
        - nn_regressor:
            params:
              hidden_layer_sizes:
                - [50]
                - [100]
              alpha: [0.001]
              max_iter: [300]

#    validation:
#     candidates: [cv, holdout]
#     mandatory: true

partial_ordering:
  - before: imputation
    after: discretization

  - before: imputation
    after: normalization

  - before: imputation
    after: features

  - before: imputation
    after: rebalancing

  - before: discretization
    after: normalization

  - before: normalization
    after: features

  - before: features
    after: classification

  - before: features
    after: regression

  - before: rebalancing
    after: classification

  - before: rebalancing
    after: regression


constraints:

  - if:
      classification: {}
    forbid: [regression]

  - if:
      regression: {}
    forbid: [classification]

  # =========================
  # CLASSIFICATION
  # =========================

  - if:
      classification: dt
    require: [discretization]
    forbid: [normalization, features]

  - if:
      classification: rf
    forbid: [normalization]

  - if:
      classification: knn
    require: [normalization, features]

  - if:
      classification: nn
    require: [normalization]
    forbid: [discretization]

  - if:
      classification: naive_bayes
    forbid: [normalization]

  - if:
      classification: ada_boost
    forbid: [normalization]


  # =========================
  # REGRESSION
  # =========================

  - if:
      regression: linear
    require: [normalization]
    forbid: [discretization]

  - if:
      regression: ridge
    require: [normalization]
    forbid: [discretization]

  - if:
      regression: lasso
    require: [normalization]
    forbid: [discretization]

  - if:
      regression: elastic_net
    require: [normalization]
    forbid: [discretization]

  - if:
      regression: svr
    require: [normalization]
    forbid: [discretization]

  - if:
      regression: knn_regressor
    require: [normalization, features]

  - if:
      regression: nn_regressor
    require: [normalization]
    forbid: [discretization]

  - if:
      regression: rf_regressor
    forbid: [normalization]


  # =========================
  # SHARED BEST PRACTICES
  # =========================

  - if:
      features: pca
    require: [normalization]

  - if:
      features: select_k_best
    forbid: [discretization]

  - if:
      rebalancing: smote
    require: [imputation]

  - if:
      imputation: iterative_imputer
    require: [normalization]