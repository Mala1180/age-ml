pipeline:

  defaults:
    values: []
    mandatory: false
    terminal: false
    initial: false

  steps:
    step1:
      values: [a, b]
      initial: true
      mandatory: true

    step2:
      values: [c, d]

    step3:
      values: [e, f, g, h]

    step4:
      values: [i, j]

    step5:
      values: [k, l]
      terminal: true
      mandatory: true


partial_ordering:
  - before: step1
    after: step2

  - before: step2
    after: step3

  - before: step1
    after: step4

  - before: step4
    after: step5


constraints:
  - if:
      step2: {}
    require:
      steps: [step1]
    forbid:
      steps: [step3]

  - if:
      step1: a
    require:
      steps: [step2, step4]

  - if:
      step1: b
    require:
      steps:
        step3: f
        step4: i
    forbid:
      steps:
        step3: e
        step4: j

  - if:
      step4: j
    forbid:
      steps: [step3]
