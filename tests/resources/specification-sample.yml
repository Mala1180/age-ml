pipeline:

  defaults:
    values: []
    mandatory: false
    terminal: false
    initial: false

  steps:
    step1:
      values: [a, b]
      initial: true
      mandatory: true

    step2:
      values: [c, d]

    step3:
      values: [e, f, g, h]

    step4:
      values: [i, j, k]

    step5:
      values: [l, m]
      terminal: true
      mandatory: true


partial_ordering:
  - before: step1
    after: step2

  - before: step2
    after: step3

  - before: step1
    after: step4

  - before: step4
    after: step5


constraints:

  - if:
      step1: {}
    require: [step2, step4]
    forbid: [step3]

  - if:
      step1: b
    require:
      - step4: j
    forbid:
      - step5: l

  - if:
      step4: j
    forbid: [step3]
