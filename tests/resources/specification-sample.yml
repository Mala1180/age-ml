pipeline:
  defaults:
    candidates: []
    mandatory: false

  steps:
    step1:
      candidates: [a, b]
      mandatory: true

    step2:
      candidates: [c, d]

    step3:
      candidates: [e, f, g, h]

    step4:
      candidates: [i, j, k]

    step5:
      candidates: [l, m]
      mandatory: true

ordering:

  - sequence:
      - step1
      - step2
      - step3

  - before: step1
    after: step2

  - before: step2
    after: step3

  - before: step1
    after: step4

  - before: step4
    after: step5

constraints:
  - if:
      step: step1
    require: [step2, step4]
    forbid: [step3]

  - if:
      step:
        step1: b
    require:
      - step4: j
    forbid:
      - step5: l

  - if:
      step:
        step4: j
    forbid: [step3]

technical_details:
  - use python for the implementation
  - use scikit-learn for the ML algorithms
